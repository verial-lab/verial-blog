<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <style>
    * { margin: 0; padding: 0; }
    body {
      background: #060606;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 800px;
      height: 800px;
      overflow: hidden;
    }
  </style>
</head>
<body class="ready">
  <svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wm" x="-10%" y="-10%" width="120%" height="120%">
      <feFlood flood-color="#060606" result="fill"/>
      <feComposite in="fill" in2="SourceGraphic" operator="in" result="base"/>
      <feOffset in="SourceAlpha" dx="-1" dy="-1" result="shadowOff"/>
      <feFlood flood-color="white" flood-opacity="0.7" result="shadowColor"/>
      <feComposite in="shadowColor" in2="shadowOff" operator="in" result="shadow"/>
      <feOffset in="SourceAlpha" dx="1" dy="1" result="hlOff"/>
      <feFlood flood-color="white" flood-opacity="0.18" result="hlColor"/>
      <feComposite in="hlColor" in2="hlOff" operator="in" result="highlight"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="base"/>
        <feMergeNode in="highlight"/>
      </feMerge>
    </filter>
    <marker id="chevron" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <polyline points="1,1 9,5 1,9" fill="none" stroke="white" stroke-width="1.5"/>
    </marker>
    <marker id="chevron-accent" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <polyline points="1,1 9,5 1,9" fill="none" stroke="#999" stroke-width="1.5"/>
    </marker>
    
    
    <radialGradient id="wm-mask-grad-0" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="black"/>
      <stop offset="70%" stop-color="black"/>
      <stop offset="100%" stop-color="white"/>
    </radialGradient>
    <mask id="wm-mask">
      <rect width="100%" height="100%" fill="white"/>
      
    <ellipse cx="400" cy="380" rx="280" ry="250" fill="url(#wm-mask-grad-0)"/>
    </mask>
  </defs>
  <rect width="800" height="800" fill="#060606"/>
  <g mask="url(#wm-mask)">
    <g class="watermark"><text x="133.33333333333334" y="133.33333333333334" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">V</text>
<text x="400" y="133.33333333333334" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">E</text>
<text x="666.6666666666667" y="133.33333333333334" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">R</text>
<text x="133.33333333333334" y="400" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">I</text>
<text x="400" y="400" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">A</text>
<text x="666.6666666666667" y="400" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">L</text>
<text x="133.33333333333334" y="666.6666666666667" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">.X</text>
<text x="400" y="666.6666666666667" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">Y</text>
<text x="666.6666666666667" y="666.6666666666667" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">Z</text></g>
  </g>
  <g class="diagram"><circle cx="400" cy="160" r="50" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
<text x="400" y="155" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" opacity="0.8">COMPLEXITY</text>
<text x="400" y="170" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8" font-weight="400" fill="#FFFFFF" text-anchor="middle" opacity="0.4">grows</text>
<line x1="400" y1="215" x2="400" y2="260" stroke="#FFFFFF" stroke-width="1" marker-end="url(#chevron)" opacity="0.5"/>
<rect x="300" y="265" width="200" height="45" fill="none" stroke="#999999" stroke-width="1" opacity="0.6"/>
<text x="400" y="293" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle" opacity="0.8">ILLEGIBILITY</text>
<line x1="400" y1="315" x2="400" y2="355" stroke="#FFFFFF" stroke-width="1" marker-end="url(#chevron)" opacity="0.5"/>
<rect x="300" y="360" width="200" height="45" fill="none" stroke="#999999" stroke-width="1" opacity="0.6"/>
<text x="400" y="388" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" opacity="0.8">WRONG ABSTRACTIONS</text>
<line x1="400" y1="410" x2="400" y2="450" stroke="#FFFFFF" stroke-width="1" marker-end="url(#chevron)" opacity="0.5"/>
<rect x="300" y="455" width="200" height="45" fill="none" stroke="#999999" stroke-width="1" opacity="0.6"/>
<text x="400" y="483" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" opacity="0.8">MORE COMPLEXITY</text>
<line x1="505" y1="478" x2="560" y2="478" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
<line x1="560" y1="478" x2="560" y2="160" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
<line x1="560" y1="160" x2="455" y2="160" stroke="#999999" stroke-width="1" marker-end="url(#chevron-accent)" opacity="0.5"/>
<text x="580" y="320" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8" font-weight="400" fill="#FFFFFF" text-anchor="start" opacity="0.3">FEEDBACK</text>
<text x="580" y="332" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8" font-weight="400" fill="#FFFFFF" text-anchor="start" opacity="0.3">LOOP</text>
<rect x="250" y="535" width="300" height="50" rx="6" fill="none" stroke="#FFFFFF" stroke-width="1" filter="url(#neon)"/>
<text x="400" y="557" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" filter="url(#neon)">CASCADE</text>
<text x="400" y="573" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8" font-weight="400" fill="#FFFFFF" text-anchor="middle" opacity="0.4">system becomes unmaintainable</text>
<line x1="400" y1="505" x2="400" y2="535" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="6,4" marker-end="url(#chevron)" opacity="0.4"/></g>
  <g class="title-block">
    <text x="400" y="708" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.5" letter-spacing="0.25em" text-anchor="middle">MENTAL MODEL</text>
    <text x="400" y="740" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#FFFFFF" filter="url(#neon)" text-anchor="middle">The Illegibility Cascade</text>
    <text x="400" y="762" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.5" letter-spacing="0.25em" text-anchor="middle">= how complexity compounds into collapse</text>
  </g>
  <text x="400" y="780" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.25" text-anchor="middle">verial.xyz</text>
</svg>
</body>
</html>
