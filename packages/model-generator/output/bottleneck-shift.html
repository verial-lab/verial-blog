<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <style>
    * { margin: 0; padding: 0; }
    body {
      background: #060606;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 800px;
      height: 800px;
      overflow: hidden;
    }
  </style>
</head>
<body class="ready">
  <svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wm" x="-10%" y="-10%" width="120%" height="120%">
      <feFlood flood-color="#060606" result="fill"/>
      <feComposite in="fill" in2="SourceGraphic" operator="in" result="base"/>
      <feOffset in="SourceAlpha" dx="-1" dy="-1" result="shadowOff"/>
      <feFlood flood-color="white" flood-opacity="0.7" result="shadowColor"/>
      <feComposite in="shadowColor" in2="shadowOff" operator="in" result="shadow"/>
      <feOffset in="SourceAlpha" dx="1" dy="1" result="hlOff"/>
      <feFlood flood-color="white" flood-opacity="0.18" result="hlColor"/>
      <feComposite in="hlColor" in2="hlOff" operator="in" result="highlight"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="base"/>
        <feMergeNode in="highlight"/>
      </feMerge>
    </filter>
    <marker id="chevron" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <polyline points="1,1 9,5 1,9" fill="none" stroke="white" stroke-width="1.5"/>
    </marker>
    <marker id="chevron-accent" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <polyline points="1,1 9,5 1,9" fill="none" stroke="#999" stroke-width="1.5"/>
    </marker>
    
    
    <radialGradient id="wm-mask-grad-0" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="black"/>
      <stop offset="70%" stop-color="black"/>
      <stop offset="100%" stop-color="white"/>
    </radialGradient>
    <mask id="wm-mask">
      <rect width="100%" height="100%" fill="white"/>
      
    <ellipse cx="400" cy="340" rx="250" ry="180" fill="url(#wm-mask-grad-0)"/>
    </mask>
  </defs>
  <rect width="800" height="800" fill="#060606"/>
  <g mask="url(#wm-mask)">
    <g class="watermark"><text x="133.33333333333334" y="133.33333333333334" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">V</text>
<text x="400" y="133.33333333333334" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">E</text>
<text x="666.6666666666667" y="133.33333333333334" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">R</text>
<text x="133.33333333333334" y="400" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">I</text>
<text x="400" y="400" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">A</text>
<text x="666.6666666666667" y="400" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">L</text>
<text x="133.33333333333334" y="666.6666666666667" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">.X</text>
<text x="400" y="666.6666666666667" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">Y</text>
<text x="666.6666666666667" y="666.6666666666667" text-anchor="middle" dominant-baseline="central"
               font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="110" font-weight="bold"
               fill="#060606" filter="url(#wm)">Z</text></g>
  </g>
  <g class="diagram"><rect x="100" y="180" width="160" height="60" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
<text x="180" y="215" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" opacity="0.8">WRITING CODE</text>
<rect x="540" y="180" width="160" height="60" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
<text x="620" y="215" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" opacity="0.8">READING CODE</text>
<line x1="270" y1="210" x2="530" y2="210" stroke="#FFFFFF" stroke-width="1" marker-end="url(#chevron)" opacity="0.5"/>
<text x="400" y="198" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" font-weight="400" fill="#FFFFFF" text-anchor="middle" opacity="0.4">AI accelerates production</text>
<rect x="280" y="320" width="240" height="80" rx="6" fill="none" stroke="#999999" stroke-width="1" filter="url(#neon)"/>
<text x="400" y="350" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle" filter="url(#neon)">BOTTLENECK</text>
<text x="400" y="372" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" font-weight="400" fill="#FFFFFF" text-anchor="middle" opacity="0.5">shifts from production → comprehension</text>
<line x1="180" y1="250" x2="320" y2="320" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="6,4" marker-end="url(#chevron)" opacity="0.3"/>
<line x1="620" y1="250" x2="480" y2="320" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="6,4" marker-end="url(#chevron)" opacity="0.3"/>
<rect x="200" y="460" width="400" height="50" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>
<text x="400" y="490" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-weight="400" fill="#FFFFFF" text-anchor="middle" opacity="0.4">legibility determines velocity</text></g>
  <g class="title-block">
    <text x="400" y="708" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.5" letter-spacing="0.25em" text-anchor="middle">MENTAL MODEL</text>
    <text x="400" y="740" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#FFFFFF" filter="url(#neon)" text-anchor="middle">The Bottleneck Shift</text>
    <text x="400" y="762" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.5" letter-spacing="0.25em" text-anchor="middle">= comprehension is the new limit</text>
  </g>
  <text x="400" y="780" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.25" text-anchor="middle">verial.xyz</text>
</svg>
</body>
</html>
