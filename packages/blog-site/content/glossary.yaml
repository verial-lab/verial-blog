- term: Containment
  definition: "The structural boundary that limits what a system can affect. In systems design, containment must scale with the capability it contains."

- term: Legibility
  definition: "The quality of a system that makes its internal state observable and understandable to external actors."

- term: Systems Thinking
  definition: "A holistic approach to analysis that focuses on how components interrelate and behave as a whole over time."
