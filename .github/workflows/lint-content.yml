name: Lint content

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-writing:
    name: Writing Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/lint-writing.js --ci
