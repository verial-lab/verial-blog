name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build

  test-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Install Playwright browsers
        working-directory: packages/blog-site
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: packages/blog-site
        run: npx playwright test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/blog-site/playwright-report/
          retention-days: 14

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Build site
        run: npm run build
      - name: Run Lighthouse CI
        working-directory: packages/blog-site
        run: |
          npm start &
          sleep 5
          npx @lhci/cli autorun --collect.url=http://localhost:3000/ --collect.url=http://localhost:3000/essays --collect.url=http://localhost:3000/essays/containment-systems-design --collect.url=http://localhost:3000/glossary
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: packages/blog-site/.lighthouseci/
          retention-days: 14
